<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- B+D hybrid v8: B's route S-ing through D's dawn scene; the skyway
       is a translucent glass sleeve around the route where it crosses
       the gap between the towers — the route wears the skyway. -->
  <defs>
    <linearGradient id="bd-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6fb0f5"/>
      <stop offset="0.55" stop-color="#bcd8f9"/>
      <stop offset="1" stop-color="#fbd191"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bd-sky)"/>
  <circle cx="112" cy="104" r="42" fill="#f59e0b" opacity="0.9"/>
  <!-- background skyline -->
  <path d="M0 512 V392 h50 v-56 h44 v76 h36 v-110 h58 v96 h42 v-72 h48 v104 h50 v-84 h56 v60 h50 v-44 h78 v152 Z"
        fill="#31518f" opacity="0.45"/>
  <!-- foreground towers -->
  <rect x="52" y="256" width="116" height="256" fill="#14213d"/>
  <rect x="344" y="160" width="116" height="352" fill="#14213d"/>
  <!-- the route -->
  <path d="M104 452 H188 a26 26 0 0 0 26 -26 V352 a26 26 0 0 1 26 -26 H402"
        fill="none" stroke="#14213d" stroke-width="54" stroke-linecap="round" opacity="0.28"/>
  <path d="M104 452 H188 a26 26 0 0 0 26 -26 V352 a26 26 0 0 1 26 -26 H402"
        fill="none" stroke="#f59e0b" stroke-width="40" stroke-linecap="round"/>
  <!-- glass skyway sleeve where the route crosses the gap -->
  <rect x="248" y="298" width="92" height="56" rx="24" fill="#f8fafc" opacity="0.5"/>
  <rect x="248" y="298" width="92" height="56" rx="24" fill="none" stroke="#f8fafc" stroke-width="8"/>
  <!-- start + destination -->
  <circle cx="104" cy="452" r="32" fill="#f8fafc"/>
  <circle cx="104" cy="452" r="15" fill="#f59e0b"/>
  <circle cx="402" cy="326" r="32" fill="#f8fafc"/>
  <circle cx="402" cy="326" r="15" fill="#14213d"/>
</svg>
