<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- "The Route": amber route threading between city blocks, start dot to
       destination — chosen 2026-07-18 (design/icon-candidates has the
       alternates). scripts/render-icons.mjs swaps rx="112" -> rx="0" for
       the full-bleed apple-touch icon; the maskable/iOS pipeline keys on
       the gradient id "bg". -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="52" y="52" width="150" height="150" rx="26" fill="#3b5bd6" opacity="0.85"/>
  <rect x="310" y="52" width="150" height="150" rx="26" fill="#3b5bd6" opacity="0.55"/>
  <rect x="52" y="310" width="150" height="150" rx="26" fill="#3b5bd6" opacity="0.55"/>
  <rect x="310" y="310" width="150" height="150" rx="26" fill="#3b5bd6" opacity="0.85"/>
  <path d="M120 400 H244 a24 24 0 0 0 24 -24 V136 a24 24 0 0 1 24 -24 H392"
        fill="none" stroke="#0b1b45" stroke-width="58" stroke-linecap="round" opacity="0.35"/>
  <path d="M120 400 H244 a24 24 0 0 0 24 -24 V136 a24 24 0 0 1 24 -24 H392"
        fill="none" stroke="#f59e0b" stroke-width="44" stroke-linecap="round"/>
  <circle cx="120" cy="400" r="34" fill="#f8fafc"/>
  <circle cx="120" cy="400" r="16" fill="#f59e0b"/>
  <circle cx="392" cy="112" r="34" fill="#f8fafc"/>
  <circle cx="392" cy="112" r="16" fill="#1e40af"/>
</svg>
