<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1d4ed8" />
    <meta
      name="description"
      content="Skymap — navigate the Minneapolis Skyway, the largest contiguous skyway network in the world."
    />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Skymap · Minneapolis Skyway</title>
  </head>
  <body>
    <div id="app">
      <div id="map"></div>

      <header class="panel search-panel" id="search-panel">
        <div class="brand">
          <span class="brand-mark">◇</span>
          <h1>Skymap</h1>
          <span class="brand-sub">Minneapolis Skyway</span>
        </div>
        <div class="field-row">
          <div class="combo" id="combo-from">
            <span class="dot dot-from"></span>
            <input type="text" id="input-from" placeholder="From building…" autocomplete="off" />
            <ul class="combo-list" hidden></ul>
          </div>
          <button class="icon-btn" id="btn-swap" title="Swap origin and destination" aria-label="Swap">⇅</button>
        </div>
        <div class="field-row">
          <div class="combo" id="combo-to">
            <span class="dot dot-to"></span>
            <input type="text" id="input-to" placeholder="To building…" autocomplete="off" />
            <ul class="combo-list" hidden></ul>
          </div>
          <button class="icon-btn primary" id="btn-route" title="Find route" aria-label="Find route">➜</button>
        </div>
        <div class="time-row">
          <label class="time-toggle">
            <input type="radio" name="timemode" value="now" checked /> Leave now
          </label>
          <label class="time-toggle">
            <input type="radio" name="timemode" value="custom" /> At…
          </label>
          <input type="datetime-local" id="input-when" disabled />
        </div>
      </header>

      <section class="panel sheet" id="sheet" hidden>
        <button class="sheet-close" id="sheet-close" aria-label="Close">×</button>
        <div id="sheet-content"></div>
      </section>

      <footer class="disclaimer" id="disclaimer">
        Preview data: approximate locations &amp; representative hours — not yet field-verified.
      </footer>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
