<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#17243a" />
    <meta
      name="description"
      content="SkyMap — navigate the Minneapolis Skyway, the largest contiguous skyway network in the world."
    />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="SkyMap" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- iOS has no way to derive a launch splash from the manifest, so
         without these it's a blank white flash on open. One per common
         iPhone size (device-pixel dimensions); see scripts/gen-splash.mjs. -->
    <link rel="apple-touch-startup-image" href="./icons/splash/440x956-3x.png"
      media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="./icons/splash/430x932-3x.png"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="./icons/splash/428x926-3x.png"
      media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="./icons/splash/402x874-3x.png"
      media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="./icons/splash/393x852-3x.png"
      media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="./icons/splash/390x844-3x.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="./icons/splash/375x812-3x.png"
      media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="./icons/splash/414x896-3x.png"
      media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="./icons/splash/414x896-2x.png"
      media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="./icons/splash/375x667-2x.png"
      media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <title>SkyMap · Minneapolis Skyway</title>
  </head>
  <body>
    <div id="app">
      <div id="map"></div>
      <!-- Always reachable, not tucked inside a mode that only shows at
           rest — most feedback happens right after a search comes up
           short, which is exactly when the idle sheet isn't showing. -->
      <a id="feedback-link" class="feedback-persistent">Feedback</a>
      <div class="toast" id="toast" role="status" hidden></div>
      <div class="panel ramp-prompt" id="ramp-prompt" hidden>
        <span id="ramp-prompt-text"></span>
        <div class="ramp-prompt-actions">
          <button id="ramp-prompt-save">Save spot</button>
          <button id="ramp-prompt-dismiss" class="ghost">Not now</button>
        </div>
      </div>
      <button class="panel ramp-return" id="ramp-return" hidden></button>

      <!-- Screen 5: turn-by-turn instruction banner -->
      <div class="panel nav-banner" id="nav-banner" hidden>
        <div id="nav-instruction"></div>
        <div id="nav-instruction-sub"></div>
      </div>

      <!-- Screen 2: persistent top search bar, Apple Maps style — always
           on screen except while the From/To editor or nav banner (below)
           occupy the same top spot. -->
      <div class="panel search-bar-top" id="search-bar-top">
        <div class="search-row">
          <div class="combo" id="combo-search">
            <input type="text" id="input-search" placeholder="Search buildings & businesses" autocomplete="off"
              role="combobox" aria-label="Search" aria-expanded="false" aria-autocomplete="list" />
            <ul class="combo-list" role="listbox" aria-label="Search results" hidden></ul>
          </div>
          <button class="search-cancel" id="search-cancel" type="button">Cancel</button>
        </div>
      </div>

      <!-- Screen 4: floating From/To editor (Apple's placement: top) -->
      <div class="panel route-editor" id="route-editor" hidden>
        <div class="editor-rows">
          <div class="field-row">
            <div class="combo" id="combo-from">
              <span class="dot dot-from"></span>
              <input type="text" id="input-from" placeholder="From" autocomplete="off" role="combobox"
                aria-label="Starting point" aria-expanded="false" aria-autocomplete="list" />
              <ul class="combo-list" role="listbox" aria-label="Starting point suggestions" hidden></ul>
            </div>
          </div>
          <div class="field-row">
            <div class="combo" id="combo-to">
              <span class="dot dot-to"></span>
              <input type="text" id="input-to" placeholder="To" autocomplete="off" role="combobox"
                aria-label="Destination" aria-expanded="false" aria-autocomplete="list" />
              <ul class="combo-list" role="listbox" aria-label="Destination suggestions" hidden></ul>
            </div>
          </div>
        </div>
        <div class="editor-side">
          <button class="icon-btn" id="btn-swap" title="Swap origin and destination" aria-label="Swap">⇅</button>
          <button class="icon-btn" id="editor-close" title="Back" aria-label="Close directions">✕</button>
        </div>
      </div>

      <!-- The drawer: search, place cards, route preview, and the nav bar
           all live in this one bottom sheet, Apple Maps style. -->
      <section class="panel sheet drawer" id="sheet">
        <button class="sheet-handle" id="sheet-handle" aria-label="Expand or collapse"><span class="grip"></span></button>
        <button class="sheet-close" id="sheet-close" aria-label="Close" hidden>×</button>
        <div id="drawer-static">
          <div id="d-idle">
            <div class="suggestions" id="suggestions">
              <span class="suggestions-label">Show on map</span>
              <div class="suggestions-row" id="suggestions-row" role="group" aria-label="Show categories on the map"></div>
            </div>
            <div class="drawer-footer">
              <img class="brand-mark" src="/icons/icon.svg" alt="" />
              <span class="brand-name">SkyMap</span>
            </div>
          </div>
        </div>
        <div id="sheet-content"></div>
      </section>

    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
